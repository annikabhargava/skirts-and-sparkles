<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Skirts & Sparkles — Wireframes & UX Strategy</title>
<meta name="viewport" content="width=1400">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Gloria+Hallelujah&family=Kalam:wght@400;700&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Instrument+Serif&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a1a;
    --paper: #f5f1e8;
    --paper-2: #efe9dc;
    --line: #1a1a1a;
    --muted: #6b655a;
    --accent: #ff4d2e;   /* red-orange marker */
    --accent-2: #2e5bff; /* blue pen */
    --accent-3: #ffd429; /* yellow highlighter */
    --accent-4: #00a878; /* green check */
    --hand: 'Kalam', cursive;
    --hand-tight: 'Caveat', cursive;
    --ui: 'Space Grotesk', system-ui, sans-serif;
    --mono: 'Space Mono', monospace;
    --serif: 'Instrument Serif', Georgia, serif;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background: var(--paper); color: var(--ink); font-family: var(--ui); }

  /* paper texture */
  body::before {
    content: "";
    position: fixed; inset:0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(0,0,0,0.02) 0, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(0,0,0,0.02) 0, transparent 40%),
      repeating-linear-gradient(90deg, transparent 0 40px, rgba(0,0,0,0.01) 40px 41px);
    pointer-events:none; z-index:0;
  }

  /* top nav */
  .topnav {
    position: sticky; top:0; z-index:50;
    background: var(--paper);
    border-bottom: 2px solid var(--ink);
    padding: 14px 28px;
    display: flex; align-items: center; gap: 24px;
    flex-wrap: wrap;
  }
  .logo {
    font-family: var(--serif);
    font-size: 28px; line-height: 1;
    letter-spacing: -0.01em;
  }
  .logo em { font-style: italic; color: var(--accent); }
  .logo .dot { color: var(--accent-2); }
  .tabs { display:flex; gap:4px; flex-wrap: wrap; }
  .tab {
    font-family: var(--hand);
    font-size: 18px;
    padding: 8px 16px;
    border: 2px solid transparent;
    border-radius: 999px;
    cursor: pointer;
    background: transparent;
    color: var(--ink);
    transition: all .15s;
  }
  .tab:hover { background: var(--paper-2); }
  .tab.active {
    background: var(--ink);
    color: var(--paper);
    transform: rotate(-1deg);
  }
  .metanote {
    font-family: var(--hand-tight);
    font-size: 20px;
    color: var(--muted);
    margin-left: auto;
  }

  /* page content */
  main { position: relative; z-index:1; padding: 40px 48px 120px; max-width: 1400px; margin: 0 auto; }
  .pane { display: none; }
  .pane.active { display: block; }

  h1.page-h {
    font-family: var(--serif);
    font-size: 64px; line-height: 1.0;
    margin: 0 0 8px; letter-spacing: -0.02em;
  }
  .page-sub {
    font-family: var(--hand-tight);
    font-size: 28px; color: var(--muted);
    margin: 0 0 40px;
  }

  /* section */
  .section-h {
    font-family: var(--hand);
    font-size: 28px;
    margin: 48px 0 8px;
    display: inline-block;
    background: var(--accent-3);
    padding: 2px 10px;
    transform: rotate(-0.5deg);
  }
  .section-sub {
    font-family: var(--ui);
    font-size: 14px;
    color: var(--muted);
    max-width: 680px;
    margin: 0 0 24px;
    line-height: 1.5;
  }

  /* variant grid */
  .variant-grid {
    display: grid;
    gap: 28px;
    grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
    align-items: start;
  }
  .variant {
    border: 2px solid var(--ink);
    background: #fffdf7;
    border-radius: 4px;
    padding: 0;
    position: relative;
    overflow: hidden;
    box-shadow: 4px 4px 0 var(--ink);
  }
  .variant-label {
    font-family: var(--hand);
    font-size: 20px;
    padding: 8px 14px;
    background: var(--ink);
    color: var(--paper);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .variant-label .num {
    font-family: var(--mono);
    font-size: 11px;
    opacity: 0.7;
  }
  .variant-body {
    padding: 20px;
    min-height: 420px;
    position: relative;
  }
  .variant-note {
    font-family: var(--hand-tight);
    font-size: 18px;
    color: var(--muted);
    padding: 10px 14px;
    border-top: 1px dashed var(--ink);
    background: var(--paper);
  }

  /* wire primitives */
  .wire {
    border: 1.5px solid var(--ink);
    border-radius: 2px;
    position: relative;
  }
  .wire-dashed { border-style: dashed; }
  .wire-bg { background: rgba(0,0,0,0.03); }
  .wire-fill { background: var(--ink); color: var(--paper); }
  .wire-accent { background: var(--accent); color: white; }
  .wire-yellow { background: var(--accent-3); }
  .wire-blue { background: var(--accent-2); color: white; }
  .wire-green { background: var(--accent-4); color: white; }
  .hand { font-family: var(--hand); }
  .handT { font-family: var(--hand-tight); }
  .mono { font-family: var(--mono); }
  .serif { font-family: var(--serif); }

  /* reusable wire bits */
  .wire-h {
    font-family: var(--serif);
    font-size: 22px;
    margin: 0 0 6px;
    line-height: 1.1;
  }
  .wire-sub { font-family: var(--hand-tight); font-size: 18px; color: var(--muted); margin: 0 0 12px;}
  .wire-p { font-family: var(--ui); font-size: 12px; color: var(--ink); line-height: 1.4; margin: 0 0 8px;}
  .wire-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted);}

  .btn-wire {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 10px 16px; border: 2px solid var(--ink); border-radius: 999px;
    font-family: var(--ui); font-weight: 600; font-size: 13px;
    background: var(--ink); color: var(--paper); cursor: default;
  }
  .btn-wire.ghost { background: transparent; color: var(--ink); }
  .btn-wire.accent { background: var(--accent); color: white; border-color: var(--accent); }

  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border: 1.5px solid var(--ink); border-radius: 999px;
    font-family: var(--mono); font-size: 10px; background: var(--paper);
  }
  .chip.filled { background: var(--ink); color: var(--paper); }
  .chip.yellow { background: var(--accent-3); }
  .chip.green { background: var(--accent-4); color: white; border-color: var(--accent-4); }

  /* sketchy placeholder image */
  .ph {
    background:
      repeating-linear-gradient(45deg, rgba(0,0,0,0.05) 0 6px, transparent 6px 12px);
    border: 1.5px dashed var(--ink);
    display:flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 10px; color: var(--muted);
    text-align: center; padding: 8px;
  }

  /* circles crosses etc */
  .bullet { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--ink); margin-right: 6px; vertical-align: middle;}
  .arrow {
    font-family: var(--hand);
    color: var(--accent);
    font-size: 22px;
    position: absolute;
  }

  /* strategy cards */
  .strat-grid {
    display: grid; gap: 20px;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  }
  .strat-card {
    border: 2px solid var(--ink);
    background: #fffdf7;
    padding: 20px;
    border-radius: 4px;
    box-shadow: 4px 4px 0 var(--ink);
  }
  .strat-card h3 {
    font-family: var(--serif);
    font-size: 24px;
    margin: 0 0 4px;
  }
  .strat-card .num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }
  .strat-card p {
    font-size: 13px; line-height: 1.5;
  }
  .strat-card .do, .strat-card .dont {
    font-family: var(--ui); font-size: 12px;
    padding: 8px 10px; border-radius: 4px; margin: 6px 0;
    border-left: 3px solid;
  }
  .strat-card .do { background: #eaf7ee; border-color: var(--accent-4); }
  .strat-card .dont { background: #fde8e3; border-color: var(--accent); }
  .strat-card .do::before { content: "✓ "; color: var(--accent-4); font-weight: 700;}
  .strat-card .dont::before { content: "✗ "; color: var(--accent); font-weight: 700;}

  /* voice spectrum */
  .spectrum {
    display: grid;
    grid-template-columns: 140px 1fr 140px;
    align-items: center;
    gap: 16px;
    margin: 14px 0;
    font-family: var(--ui); font-size: 13px;
  }
  .spectrum .bar {
    height: 8px; background: var(--paper-2); border: 1.5px solid var(--ink); border-radius: 999px;
    position: relative;
  }
  .spectrum .dot-mark {
    position: absolute; top: 50%; transform: translate(-50%, -50%);
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--accent); border: 2px solid var(--ink);
  }
  .spectrum .left { text-align: right; color: var(--muted); }
  .spectrum .right { color: var(--muted); }

  /* phone frame */
  .phone {
    width: 280px;
    height: 560px;
    border: 2.5px solid var(--ink);
    border-radius: 32px;
    padding: 10px;
    background: #fffdf7;
    position: relative;
    box-shadow: 4px 4px 0 var(--ink);
  }
  .phone::before {
    content:"";
    position:absolute; top: 10px; left: 50%; transform: translateX(-50%);
    width: 80px; height: 6px; background: var(--ink); border-radius: 999px;
  }
  .phone-screen {
    width: 100%; height: 100%;
    border: 1.5px solid var(--ink);
    border-radius: 22px;
    overflow: hidden;
    background: var(--paper);
    display: flex;
    flex-direction: column;
  }

  /* tweaks */
  .tweaks {
    position: fixed; bottom: 20px; right: 20px; z-index: 100;
    background: var(--paper);
    border: 2px solid var(--ink);
    border-radius: 12px;
    padding: 16px;
    box-shadow: 4px 4px 0 var(--ink);
    display: none;
    width: 260px;
    font-family: var(--ui);
  }
  .tweaks.on { display: block; }
  .tweaks h4 { font-family: var(--hand); font-size: 22px; margin: 0 0 10px; }
  .tweaks label { font-size: 12px; display: flex; justify-content: space-between; align-items: center; margin: 8px 0; }
  .tweaks select { font-family: var(--mono); font-size: 11px; border: 1.5px solid var(--ink); border-radius: 4px; padding: 4px 6px; background: white; }
  .tweaks .row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .tweaks .pill { border: 1.5px solid var(--ink); background: white; padding: 4px 10px; font-family: var(--mono); font-size: 10px; border-radius: 999px; cursor: pointer; }
  .tweaks .pill.on { background: var(--ink); color: var(--paper); }

  /* annotations */
  .anno {
    font-family: var(--hand-tight);
    color: var(--accent);
    font-size: 17px;
    position: absolute;
    pointer-events: none;
    line-height: 1.1;
  }
  .anno::before {
    content: "←";
    margin-right: 4px;
  }

  /* greyscale mode */
  body.grey .variant, body.grey .phone, body.grey .wire-fill, body.grey .wire-accent, body.grey .wire-blue, body.grey .wire-yellow, body.grey .wire-green {
    filter: grayscale(1);
  }

  /* small helpers */
  .row { display:flex; }
  .col { display:flex; flex-direction: column; }
  .gap-4 { gap: 4px; } .gap-8 { gap: 8px;} .gap-12 { gap:12px;} .gap-16 { gap:16px;}
  .between { justify-content: space-between; }
  .center { align-items: center; }
  .mt-8 { margin-top: 8px;} .mt-12 { margin-top: 12px;} .mt-16 { margin-top: 16px;} .mt-24 { margin-top: 24px;}
  .mb-8 { margin-bottom: 8px;} .mb-12 { margin-bottom: 12px;}
  .p-8 { padding: 8px;} .p-12 { padding: 12px;}
  .w-full { width: 100%; }
  .h-40 { height: 40px;} .h-60 { height: 60px;} .h-80 { height: 80px;} .h-100 { height: 100px;} .h-120 { height: 120px;} .h-140 { height: 140px;}

  /* copy sample card */
  .copy-lab {
    display: grid;
    grid-template-columns: 180px 1fr 1fr 1fr;
    gap: 12px;
    align-items: stretch;
    border-bottom: 1.5px dashed var(--ink);
    padding: 20px 0;
  }
  .copy-lab:last-child { border-bottom: none; }
  .copy-lab > div { font-size: 13px; line-height: 1.4; }
  .copy-lab .scenario { font-family: var(--hand); font-size: 22px; }
  .copy-lab .scenario small { display: block; font-family: var(--ui); font-size: 11px; color: var(--muted); margin-top: 4px; font-weight: 400; }
  .copy-card {
    border: 1.5px solid var(--ink); border-radius: 4px; padding: 14px;
    background: #fffdf7;
    display: flex; flex-direction: column; gap: 6px;
  }
  .copy-card .ttl { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
  .copy-card .txt { font-family: var(--ui); font-size: 13px; line-height: 1.4; }
  .copy-card.warm { border-color: #c77455; }
  .copy-card.cool { border-color: #3a4a5c; }
  .copy-card.scene { border-color: var(--accent); background: #1a1a1a; color: var(--paper); }
  .copy-card.scene .ttl { color: rgba(255,255,255,0.6); }

  /* vibe cards */
  .vibe-card {
    border: 2px solid var(--ink);
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 6px 6px 0 var(--ink);
  }
  .vibe-head {
    padding: 14px 16px;
    border-bottom: 2px solid var(--ink);
    font-family: var(--hand);
    font-size: 22px;
    background: var(--paper-2);
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .vibe-head .sub { font-family: var(--ui); font-size: 11px; color: var(--muted); font-weight: 400; }
  .vibe-body { padding: 0; min-height: 480px; position: relative; }

  /* vibe A — dutch */
  .v-dutch { background: #faf8f3; font-family: 'Inter', var(--ui); }
  .v-dutch .hero { padding: 32px 28px; }
  .v-dutch h1 { font-family: var(--serif); font-size: 48px; line-height: 0.95; margin: 0 0 16px; letter-spacing: -0.02em; }
  .v-dutch .kicker { font-family: var(--mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: #888; margin-bottom: 8px;}
  .v-dutch .meta { display: flex; gap: 20px; font-size: 12px; margin: 12px 0 20px; color: #444; }
  .v-dutch .btn { background: #1a1a1a; color: #fff; padding: 10px 18px; border-radius: 999px; font-size: 13px; font-weight: 600; display: inline-block;}
  .v-dutch .ph-img { margin: 16px 28px; height: 120px; background: repeating-linear-gradient(45deg, #eee 0 6px, transparent 6px 12px); border: 1px dashed #bbb; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 10px; color: #888; }

  /* vibe B — warehouse */
  .v-ware { background: #0d0d0d; color: #e8e8e8; position: relative; }
  .v-ware::before { content:""; position: absolute; inset:0; background-image: radial-gradient(circle at 70% 20%, rgba(255,77,46,0.25), transparent 50%); }
  .v-ware .hero { padding: 28px; position: relative; }
  .v-ware h1 { font-family: 'Space Mono', monospace; font-size: 42px; line-height: 0.95; margin: 0 0 8px; text-transform: uppercase; letter-spacing: -0.02em;}
  .v-ware h1 em { color: var(--accent); font-style: normal; }
  .v-ware .kicker { font-family: var(--mono); font-size: 10px; color: var(--accent); letter-spacing: 0.15em; }
  .v-ware .meta { font-family: var(--mono); font-size: 11px; color: #999; margin: 12px 0;}
  .v-ware .btn { background: var(--accent); color: #fff; padding: 12px 18px; font-family: var(--mono); font-weight: 700; font-size: 12px; text-transform: uppercase; display: inline-block; letter-spacing: 0.1em;}
  .v-ware .strip { border-top: 1px solid #333; border-bottom: 1px solid #333; padding: 10px 28px; font-family: var(--mono); font-size: 11px; color: #666; display: flex; justify-content: space-between; margin-top: 16px; }

  /* vibe C — newcomer / warm editorial */
  .v-warm { background: linear-gradient(180deg, #fdf4e8, #fce6d4); }
  .v-warm .hero { padding: 28px; }
  .v-warm h1 { font-family: var(--serif); font-size: 46px; font-style: italic; line-height: 0.98; margin: 0 0 8px; color: #2a1810; }
  .v-warm h1 .spark { color: var(--accent); font-style: normal; font-family: var(--hand); font-size: 36px; display: inline-block; transform: rotate(-4deg); }
  .v-warm .kicker { font-family: var(--hand); font-size: 18px; color: #c44; margin-bottom: 4px; }
  .v-warm .meta { font-size: 13px; color: #6a4a30; margin: 12px 0 20px; line-height: 1.5; max-width: 90%;}
  .v-warm .btn { background: #2a1810; color: #fdf4e8; padding: 12px 20px; border-radius: 999px; font-family: var(--ui); font-weight: 600; font-size: 13px; display: inline-block;}
  .v-warm .btn.sec { background: transparent; color: #2a1810; border: 2px solid #2a1810; margin-left: 8px; }

</style>
</head>
<body>

<nav class="topnav">
  <div class="logo"><em>Skirts</em> & Sparkles<span class="dot">.</span></div>
  <div class="tabs" id="tabs">
    <button class="tab active" data-pane="strategy">1. Strategy</button>
    <button class="tab" data-pane="wireframes">2. Wireframes</button>
    <button class="tab" data-pane="vibes">3. Vibes</button>
    <button class="tab" data-pane="voice">4. Voice lab</button>
  </div>
  <div class="metanote">wireframes &middot; v1 &middot; for your review</div>
</nav>

<main>
  <section class="pane active" id="pane-strategy"></section>
  <section class="pane" id="pane-wireframes"></section>
  <section class="pane" id="pane-vibes"></section>
  <section class="pane" id="pane-voice"></section>
</main>

<div class="tweaks" id="tweaks">
  <h4>Tweaks</h4>
  <label>Fidelity
    <div class="row">
      <span class="pill on" data-set="fidelity" data-val="sketchy">sketchy</span>
      <span class="pill" data-set="fidelity" data-val="grey">greyscale</span>
    </div>
  </label>
  <label>Wireframe screen
    <select id="screenSelect">
      <option value="all">All (scroll)</option>
      <option value="home">Homepage</option>
      <option value="event">Event detail</option>
      <option value="listing">Ticket listing</option>
      <option value="buy">Buy flow</option>
      <option value="sell">Sell flow</option>
      <option value="account">My tickets + alerts</option>
      <option value="mobile">Mobile / in queue</option>
      <option value="empty">Empty & errors</option>
    </select>
  </label>
  <label>Voice lab tone
    <div class="row">
      <span class="pill on" data-set="tone" data-val="all">all 3</span>
      <span class="pill" data-set="tone" data-val="warm">warm</span>
      <span class="pill" data-set="tone" data-val="cool">cool</span>
      <span class="pill" data-set="tone" data-val="scene">scene</span>
    </div>
  </label>
</div>

<script type="application/json" id="tweak-defaults">
/*EDITMODE-BEGIN*/{
  "fidelity": "sketchy",
  "tone": "scene",
  "screen": "all"
}/*EDITMODE-END*/
</script>

<script src="strategy.js?v=2"></script>
<script src="wireframes.js?v=2"></script>
<script src="vibes.js?v=2"></script>
<script src="voice.js?v=2"></script>
<script src="app.js?v=2"></script>

</body>
</html>
